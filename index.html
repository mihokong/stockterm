<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="주식 뉴스와 시황을 이해하기 위한 주식·금융 용어 사전">
    <title>주식용어 사전</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="site-header">
      <nav class="topbar" aria-label="주요 메뉴">
        <a class="brand" href="./" aria-label="주식용어 사전 홈">
          <span class="brand-mark" aria-hidden="true">
            <svg viewBox="0 0 24 24" role="img">
              <path d="M4 17.5h16M6 15l3.3-4 3 2.3L18 6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M15.2 6H18v2.8" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </span>
          <span>주식용어 사전</span>
        </a>
        <a class="github-link" href="https://pages.github.com/" target="_blank" rel="noreferrer">GitHub Pages</a>
      </nav>

      <section class="hero">
        <div class="hero-copy">
          <p class="eyebrow">뉴스가 쉬워지는 금융 용어 정리</p>
          <h1>주식 뉴스 속 핵심 용어를 검색하고 분류별로 확인하세요.</h1>
          <p class="hero-text">한국경제신문 브리핑 영상에서 언급된 용어를 바탕으로, 시장·매매·IPO·거시경제 용어를 한곳에 모았습니다.</p>
        </div>
        <div class="market-panel" aria-label="시장 흐름 예시">
          <div class="panel-head">
            <span>Market Brief</span>
            <strong>용어 흐름</strong>
          </div>
          <div class="chart" aria-hidden="true">
            <span style="height: 36%"></span>
            <span style="height: 58%"></span>
            <span style="height: 46%"></span>
            <span style="height: 74%"></span>
            <span style="height: 64%"></span>
            <span style="height: 88%"></span>
          </div>
          <ul class="trend-list">
            <li><span>순환매</span><strong>업종별 자금 이동</strong></li>
            <li><span>조정</span><strong>과열 이후 숨고르기</strong></li>
            <li><span>IPO</span><strong>상장 전 공개 절차</strong></li>
          </ul>
        </div>
      </section>
    </header>

    <main class="content">
      <section class="controls" aria-label="용어 검색 및 필터">
        <div class="search-box">
          <svg aria-hidden="true" viewBox="0 0 24 24">
            <path d="m21 21-4.3-4.3m2.3-5.2a7.5 7.5 0 1 1-15 0 7.5 7.5 0 0 1 15 0Z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
          <input id="searchInput" type="search" autocomplete="off" placeholder="용어, 설명, 예시로 검색" aria-label="용어 검색">
        </div>
        <div class="category-tabs" id="categoryTabs" aria-label="분류 선택"></div>
      </section>

      <section class="summary" aria-live="polite">
        <p><strong id="resultCount">0</strong>개의 용어 <span id="activeFilter"></span></p>
        <button class="reset-button" id="resetButton" type="button">초기화</button>
      </section>

      <section class="term-grid" id="termGrid" aria-label="주식 용어 목록"></section>
      <p class="empty-state" id="emptyState" hidden>검색 결과가 없습니다. 다른 단어를 입력하거나 분류를 변경해 보세요.</p>
    </main>

    <footer class="site-footer">
      <p>데이터 추가는 <code>data/terms.json</code> 파일에 항목을 넣으면 됩니다.</p>
    </footer>

    <script src="script.js" defer></script>
  </body>
</html>
